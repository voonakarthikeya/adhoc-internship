<!DOCTYPE html>
<html>

<head>

<title>Random Quote Submitter</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Random Quote Carousel</h2>

<div class="quote-box">

<p id="quote">Loading...</p>

<h4 id="author"></h4>

</div>

<button onclick="loadQuote()">Next Quote</button>

<hr>

<h2>Submit Your Quote</h2>

<form id="quoteForm">

<input
type="text"
id="authorInput"
placeholder="Author Name">

<textarea
id="quoteInput"
placeholder="Write Quote">
</textarea>

<button type="submit">

Submit Quote

</button>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
